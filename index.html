<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移動安全信賴中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.25),_transparent_45%),radial-gradient(circle_at_80%_20%,_rgba(16,185,129,0.2),_transparent_35%)]"></div>

    <header class="border-b border-slate-800/80 bg-slate-950/70 backdrop-blur">
        <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-6 py-4">
            <a href="./index.html" class="flex items-center gap-3 text-lg font-semibold tracking-wide text-sky-300 transition hover:text-sky-200">
                <img src="./assets/icon.png" alt="無人機資安合規中心" class="h-10 w-auto max-h-10 object-contain" />
                <span>移動安全信賴中心</span>
            </a>
        </nav>
    </header>

    <main class="mx-auto flex w-full max-w-6xl flex-col gap-10 px-6 py-12 md:py-20">
        <section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-8 shadow-[0_0_60px_rgba(56,189,248,0.1)] md:p-12">
            <p class="mb-4 inline-flex rounded-full border border-sky-400/40 bg-sky-400/10 px-4 py-1 text-sm text-sky-300">
                Drone Security & Learning Portal
            </p>
            <h1 class="text-3xl font-bold leading-tight text-white md:text-5xl">
                無人機工具入口
            </h1>
            <p class="mt-5 max-w-3xl text-base text-slate-300 md:text-lg">
                依任務需求選擇工具：資安合規分析與學科模擬考練習分流操作，提升使用效率。
            </p>
        </section>

        <section class="grid gap-6 md:grid-cols-2">
            <article class="rounded-2xl border border-sky-800/60 bg-slate-900/70 p-8">
                <p class="inline-flex rounded-full border border-sky-300/40 bg-sky-400/10 px-3 py-1 text-xs font-semibold text-sky-200">資安合規類</p>
                <h2 class="mt-4 text-2xl font-semibold text-white">遙控無人機資安檢測範圍分析工具</h2>
                <p class="mt-3 text-slate-300">協助快速盤點合規範圍、檢測章節與受測準備文件。</p>
                <a
                    href="./tool.html"
                    class="mt-6 inline-flex items-center justify-center rounded-lg border border-sky-300/50 bg-sky-400/10 px-6 py-3 text-base font-semibold text-sky-200 transition hover:bg-sky-400/20 focus:outline-none focus:ring-2 focus:ring-sky-300 focus:ring-offset-2 focus:ring-offset-slate-900"
                >
                    開始分析 (Start Analysis)
                </a>
            </article>

            <article class="rounded-2xl border border-violet-800/60 bg-slate-900/70 p-8">
                <p class="inline-flex rounded-full border border-violet-300/40 bg-violet-400/10 px-3 py-1 text-xs font-semibold text-violet-200">學科測驗類</p>
                <h2 class="mt-4 text-2xl font-semibold text-white">民航局無人機學科考試模擬考工具</h2>
                <p class="mt-3 text-slate-300">進行題庫模擬測驗與知識練習，熟悉考試方向與題型。</p>
                <a
                    href="./preview.html"
                    class="mt-6 inline-flex items-center justify-center rounded-lg border border-violet-300/50 bg-violet-400/10 px-6 py-3 text-base font-semibold text-violet-200 transition hover:bg-violet-400/20 focus:outline-none focus:ring-2 focus:ring-violet-300 focus:ring-offset-2 focus:ring-offset-slate-900"
                >
                    開始模擬考 (Start Exam)
                </a>
            </article>
        </section>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-8 md:p-10">
            <h2 class="text-2xl font-semibold text-white">資源下載</h2>
            <p class="mt-3 text-slate-300">可下載資安檢測規範與學科測驗題庫，作為分析與練習依據。</p>
            <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:flex-wrap">
                <a
                    href="./assets/遙控無人機資安檢測規範.pdf"
                    download
                    class="inline-flex items-center justify-center rounded-lg border border-emerald-300/40 bg-emerald-400/10 px-6 py-3 font-medium text-emerald-300 transition hover:bg-emerald-400/20"
                >
                    下載《遙控無人機資安檢測規範》
                </a>
                <a
                    href="./assets/專業操作證學科測驗題庫(1140528更新)_3833_102645.pdf"
                    download
                    class="inline-flex items-center justify-center rounded-lg border border-amber-300/40 bg-amber-400/10 px-6 py-3 font-medium text-amber-200 transition hover:bg-amber-400/20"
                >
                    下載《專業操作證學科測驗題庫》
                </a>
            </div>
        </section>
    </main>
</body>
</html>
